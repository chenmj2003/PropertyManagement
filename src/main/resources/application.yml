server:
  port: 8080

spring:
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      jedis:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/propertymanagement?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    hikari:
      maximum-pool-size: 50           # 最大连接数（默认10，高并发场景需加大）
      minimum-idle: 10                # 最小空闲连接
      connection-timeout: 3000        # 获取连接超时 3 秒
      idle-timeout: 600000            # 空闲连接回收 10 分钟
      max-lifetime: 1800000           # 连接最大存活 30 分钟
      connection-test-query: SELECT 1 # 连接存活检测
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
